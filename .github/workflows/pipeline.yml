name: Code Review Pipeline

on:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install tools
        run: pip install flake8 bandit google-generativeai

      - name: Code Quality Check
        run: flake8 .
        continue-on-error: true

      - name: Security Check
        run: bandit -r .
        continue-on-error: true

      - name: Run AI Review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_review.py