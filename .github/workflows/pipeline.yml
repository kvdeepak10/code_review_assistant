name: AI Multi Agent Pipeline

on:
  push:
    branches: [main, feature/*]

jobs:

  # --------------------
  # QUALITY AGENT (warnings only)
  # --------------------
  quality:
    runs-on: ubuntu-latest
    continue-on-error: true   # quality should not block pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flake8 google-genai

      - name: Run flake8
        run: flake8 . > flake.txt || true

      - name: Quality AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_quality_agent.py

      - name: Annotate
        run: python annotate.py


  # --------------------
  # SECURITY AGENT (STRICT)
  # --------------------
  security:
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: false   # MUST fail pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install bandit google-genai

      - name: Run bandit
        run: bandit -r . -f txt -o bandit.txt

      - name: Security AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_security_agent.py

      - name: Annotate
        run: python annotate.py


  # --------------------
  # TEST AGENT (STRICT)
  # --------------------
  test:
    runs-on: ubuntu-latest
    needs: security
    continue-on-error: false   # stop if tests fail

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pytest google-genai

      - name: Run tests
        run: pytest > pytest.txt

      - name: Test AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_test_agent.py

      - name: Annotate
        run: python annotate.py


  # --------------------
  # GENERAL AI REVIEWER
  # --------------------
  review:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true   # review should not block merge

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-genai

      - name: Run Review AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_review_agent.py

      - name: Annotate
        run: python annotate.py