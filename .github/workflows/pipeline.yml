name: AI Multi Agent Pipeline

on:
  push:
    branches: [main, feature/*]

jobs:

  # --------------------
  # QUALITY AGENT
  # --------------------
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flake8 google-genai

      - name: Run flake8
        run: flake8 . > flake.txt || true

      - name: Quality AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python quality_ai.py

      - name: Annotate
        run: python annotate.py


  # --------------------
  # SECURITY AGENT
  # --------------------
  security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install bandit google-genai

      - name: Run bandit
        run: bandit -r . -f txt -o bandit.txt || true

      - name: Security AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python security_ai.py

      - name: Annotate
        run: python annotate.py


  # --------------------
  # TEST AGENT
  # --------------------
  test:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pytest google-genai

      - name: Run tests
        run: pytest > pytest.txt || true

      - name: Test AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_test_agent.py

      - name: Annotate
        run: python annotate.py

  # --------------------
  # GENERAL AI REVIEWER
  # --------------------
  review:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-genai

      - name: Run Review AI
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python ai_review.py

      - name: Annotate
        run: python annotate.py